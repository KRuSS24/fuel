<!DOCTYPE html>
<html lang="en" 
    xmlns:th="http://www.thymeleaf.org">    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/drivers_list.css}">
    <script th:src="@{/js/drivers_list.js}" defer></script>
    <title>Fuel Cards</title>
</head>
<body>

    <div class="container">
        <div class="box-1">
            <div class="menu-1"><a href="/">Home</a></div>
            <div class="menu-2"><a href="/fuel_cards">Cards</a></div>
            <div class="menu-3"><a href="/drivers_list">Drivers</a></div>
            <div class="menu-4"><a href="/log_book">Log Book</a></div>
        </div>  

        <div class="box-2 " style="font-family: sans-serif; font-size: 15px">
            <div style="margin-bottom: 20px; padding: 10px;">
                <ul>
                    <li><a href="#" id="openForm">Add Driver</a></li>
                    <li><a href="#" id="openEditForm">Edit Driver</a></li>
                    <li>Delete Driver</li>
                    <li>Power of attorney</li>
<!--                    <li>Assign driver to the truck</li>-->
                </ul>   
            </div>

            
            <h2>Drivers List</h2><br>
            <ul>
                <li th:each="element : ${drivers}" th:id="'driver-' + ${element.id}" class="drivers-list">
                    <span th:text="${element.lastName}"></span>
                    <span th:text="${element.firstName}"></span>
                </li>
            </ul>
        </div>

        <div class="box-3">
<!--Form "Add Driver"-->
            <form id="formBlock" class="form-hidden"
                  th:action="@{/drivers/add_driver}"
                  th:object="${driverDto}" method="post">
                <label for="firstName">First Name:</label><br>
                <input th:field="*{firstName}" type="text" id="firstName" name="firstName" ><br><br>
                <label for="lastName">Last Name:</label><br>
                <input th:field="*{lastName}" type="text" id="lastName" name="lastName" ><br><br>
                <label for="passport">Passport Nr:</label><br>
                <input th:field="*{passport}" type="text" id="passport" name="passport"><br><br>
                <label for="date-of-hire">Date of hiring:</label><br>
                <input th:field="*{dateOfHire}" type="text" id="date-of-hire" name="dateOfHire"><br><br>
                <label for="date-of-dismiss">Date of dismiss:</label><br>

                <input th:field="*{dateOfDismission}" type="text" id="date-of-dismiss" name="dateOfDismission"><br><br>
                <label for="country">Country:</label><br>
                <input th:field="*{driversCountry}" type="text" id="country" name="country"><br><br>
                <label for="city">City:</label><br>
                <input th:field="*{driversCity}" type="text" id="city" name="city"><br><br>
                <label for="address">Address:</label><br>
                <input th:field="*{driversAddress}" type="text" id="address" name="address"><br><br>
                <label for="zip">Zip:</label><br>
                <input th:field="*{driversZip}" type="text" id="zip" name="zip"><br><br>
                <label for="phone">Phone Nr:</label><br>
                <input th:field="*{driversPhone}" type="text" id="phone" name="phone"><br><br>
                <input type="submit" value="Add Driver" id="closeForm">

            </form>

<!--Form "Edit Driver"-->
            <form id="editForm" class="form-hidden"
                  th:action="@{/edit_driver}"
                  th:object="${driverDto}" method="post" style="font-family: sans-serif; font-size: 15px;">
            
                <label for="name">Last Name:</label>
                <input th:field="*{lastName}" type="text" id="name" name="lastName"><br><br>
                <label for="edit-passport">Passport Nr:</label>
                <input type="text" id="edit-passport" name="passport"><br><br>

                <input type="submit" value="Edit Driver">
            </form>
        </div>

            
    </div>
</body>
</html>
